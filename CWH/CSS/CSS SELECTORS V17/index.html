<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <link rel="stylesheet" href="style.css">
    <style>
        div{
            background-color: red;
        }
        /* CLASS SELECTORS */
        .red{
            background-color: blue;
        }
        /* ID SELECTORs */
        #green{
            background-color: green;
        }
        /* CHILD SELECTOR */
        div > p{
            color: blue;
            background-color: brown;
        }
        /* DESCENDANT SELECTOR */
        div p{
            color: blueviolet;
        }
        /* UNIVERSAL SELECTOR */
        *{
            margin: 0;
            padding: 0%;
        }
        /* PSEUDO SELECTORs */
        a:visited{
            color: yellow\;
        }

        a:active{
            background-color: red;
        }

        a:hover{
            background-color: blue;
            color: whitesmoke;
        }

        p:first-child{
            color: blue;
        }

    </style>
</head>
<body>
    <div class="one">
        <p>I am Adarsh</p>
        <p>I am GOOD</p>
    </div>
    <div class="red">I am a div</div>
    <div id="green">I am second <div></div></div>
    <div>
        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit.</p>
    </div>
    <a href="https://youtube.com/shorts/BLXYWKnTND0?si=mrW_s5wWS-rQ1HmX">GO TO YOUTUBE</a>
</body>
</html>
